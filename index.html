<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revelation Memory Prototype</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #f4f6fb;
      color: #222;
      padding: 20px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1, h2, h3 { margin-top: 0; }

    .section {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="number"],
    input[type="date"],
    textarea {
      width: 100%;
      border: 1px solid #cfd6e4;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 11px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      margin-top: 10px;
      margin-right: 8px;
    }

    button.secondary {
      background: #64748b;
    }

    button.ghost {
      background: #e5e7eb;
      color: #374151;
    }

    button.retry {
      background: #dc2626;
      color: #fff;
    }

    .verse {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin: 10px 0;
      line-height: 1.8;
    }

    .ref {
      display: inline-block;
      background: #e8eefc;
      color: #1d4ed8;
      font-weight: 700;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 999px;
      margin-bottom: 8px;
    }

    .score {
      font-size: 24px;
      font-weight: 800;
      margin: 14px 0 10px;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
    }

    .answer-box {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      background: #f8fafc;
      margin-top: 10px;
      line-height: 1.8;
      height: auto;
      min-height: 0;
      white-space: normal;
      word-break: keep-all;
    }

    .verse-line {
      margin-bottom: 6px;
      white-space: normal;
      word-break: keep-all;
    }

    .verse-line:last-child {
      margin-bottom: 0;
    }

    .verse-label {
      display: block;
      font-weight: 700;
      color: #1d4ed8;
      margin-bottom: 6px;
    }

    .char-correct {
      color: #111111;
    }

    .char-wrong {
      color: #dc2626;
      font-weight: 700;
    }

    .char-extra {
      color: #6b7280;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .daily-question-box {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      background: #fff;
      margin-top: 14px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 13px;
      font-weight: 700;
    }

    .top-info {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .range-box {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
      padding: 14px;
      margin-top: 12px;
    }

    .range-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      line-height: 1.8;
    }

    .range-item {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #dbe2ea;
      color: #111111;
      font-size: 14px;
    }

    .range-item.active {
      font-weight: 800;
      border-color: #111111;
      color: #111111;
    }

    .range-item.done-perfect {
      color: #059669;
      border-color: #059669;
      background: #ecfdf5;
      font-weight: 700;
    }

    .range-item.done-imperfect {
      color: #dc2626;
      border-color: #dc2626;
      background: #fef2f2;
      font-weight: 700;
    }

    .range-summary {
      margin-top: 10px;
      font-size: 14px;
      color: #6b7280;
    }

    .mode-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fdba74;
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .container { padding: 18px; }
      .settings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Revelation Memory</h1>
    <div class="muted">요한계시록 암송 프로토타입</div>

    <div class="top-info">
      <div class="pill" id="todayRangePill">오늘 범위</div>
      <div class="pill" id="progressPill">진행률</div>
    </div>

    <div class="section">
      <h2>학습 설정</h2>
      <div class="settings-grid">
        <div>
          <label for="startDate">시작일</label>
          <input id="startDate" type="date" />
        </div>
        <div>
          <label for="dailyCount">하루 암송 절 수</label>
          <input id="dailyCount" type="number" min="1" max="20" value="3" />
        </div>
      </div>
      <div class="btns">
        <button onclick="saveSettings()">설정 저장</button>
        <button class="ghost" onclick="resetPrototype()">전체 초기화</button>
        <button class="secondary" onclick="resetExamStatuses()">출제 완료 초기화</button>
      </div>
    </div>

    <div class="section">
      <h2>오늘의 암송</h2>
      <div class="muted">시작일과 하루 암송 절 수를 기준으로 오늘 외울 범위를 계산해.</div>
      <div id="todayVerses"></div>
    </div>

    <div class="section">
      <h2>일일 시험</h2>
      <div class="muted">시작일부터 오늘까지 누적 학습한 성구 중에서 랜덤으로 한 절씩 출제합니다.</div>

      <div class="range-box">
        <strong>출제 범위</strong><span id="examModeBadge"></span>
        <div id="examRangeList" class="range-list" style="margin-top:10px;"></div>
        <div id="examRangeSummary" class="range-summary"></div>
      </div>

      <div class="btns">
        <button onclick="pickDailyQuestion()">문제 뽑기</button>
        <button class="retry" onclick="startRetryMode()">재시험</button>
        <button class="secondary" onclick="clearDailyTest()">입력 지우기</button>
      </div>

      <div id="dailyQuestionArea" class="daily-question-box" style="display:none;"></div>

      <textarea id="dailyTestInput" placeholder="출제된 성구를 입력하세요"></textarea>
      <br />
      <button onclick="gradeDailyTest()">채점하기</button>
      <button class="secondary" onclick="pickDailyQuestion()">다음 문제</button>

      <div id="dailyResult"></div>
    </div>
  </div>

  <script>
    const SETTINGS_KEY = "rev-memory-html-prototype-settings-v1";

    let VERSES = []

    fetch("revelation.json")
       .then(res => res.json())
       .then(data => {
        VERSES = data
        renderAll()
  })

    let currentDailyQuestion = null;
    let examStatuses = {};
    let retryMode = false;
    let retryPoolRefs = [];

    function todayString() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function normalize(text) {
      return (text || "").replace(/\s+/g, "");
    }

    function loadSettings() {
      const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "null");
      return saved || {
        startDate: todayString(),
        dailyCount: 3
      };
    }

    function applySettingsToInputs() {
      const settings = loadSettings();
      document.getElementById("startDate").value = settings.startDate;
      document.getElementById("dailyCount").value = settings.dailyCount;
    }

    function saveSettings() {
      const startDate = document.getElementById("startDate").value || todayString();
      const dailyCount = Math.max(1, parseInt(document.getElementById("dailyCount").value) || 1);

      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        startDate,
        dailyCount
      }));

      examStatuses = {};
      retryMode = false;
      retryPoolRefs = [];
      currentDailyQuestion = null;
      renderAll();
      alert("설정이 저장되었습니다.");
    }

    function resetPrototype() {
      localStorage.removeItem(SETTINGS_KEY);
      location.reload();
    }

    function resetExamStatuses() {
      examStatuses = {};
      retryMode = false;
      retryPoolRefs = [];
      currentDailyQuestion = null;
      document.getElementById("dailyQuestionArea").style.display = "none";
      document.getElementById("dailyQuestionArea").innerHTML = "";
      document.getElementById("dailyTestInput").value = "";
      document.getElementById("dailyResult").innerHTML = "";
      renderExamRange();
      alert("출제 완료 상태가 초기화되었습니다.");
    }

    function daysBetween(start, end) {
      const s = new Date(start + "T00:00:00");
      const e = new Date(end + "T00:00:00");
      return Math.max(0, Math.floor((e - s) / (1000 * 60 * 60 * 24)));
    }

    function getTodayVerses() {
      const settings = loadSettings();
      const offset = daysBetween(settings.startDate, todayString());
      const startIndex = offset * settings.dailyCount;
      const endIndex = Math.min(startIndex + settings.dailyCount, VERSES.length);
      return VERSES.slice(startIndex, endIndex);
    }

    function getLearnedVerses() {
      const settings = loadSettings();
      const offset = daysBetween(settings.startDate, todayString());
      const endIndex = Math.min((offset + 1) * settings.dailyCount, VERSES.length);
      return VERSES.slice(0, endIndex);
    }

    function getRetryVerses() {
      return getLearnedVerses().filter(v => {
        const status = examStatuses[v.ref];
        return status && status.state === "done" && status.score < 100;
      });
    }

    function getTodayRangeText(selected) {
      if (!selected.length) return "오늘 범위 없음";
      const first = selected[0];
      const last = selected[selected.length - 1];
      return `계 ${first.chapter}:${first.verse}-${last.verse}`;
    }

    function renderToday() {
      const todayVerses = getTodayVerses();
      const learnedVerses = getLearnedVerses();
      const area = document.getElementById("todayVerses");

      document.getElementById("todayRangePill").textContent = `오늘 범위: ${getTodayRangeText(todayVerses)}`;
      document.getElementById("progressPill").textContent = `진행률: ${learnedVerses.length}/${VERSES.length}절`;

      if (!todayVerses.length) {
        area.innerHTML = `<div class="muted">오늘 배정된 절이 없습니다.</div>`;
        return;
      }

      area.innerHTML = todayVerses.map(v => `
        <div class="verse">
          <div class="ref">${v.ref}</div>
          <div>${escapeHtml(v.text)}</div>
        </div>
      `).join("");
    }

    function renderExamRange() {
      const source = retryMode
        ? getLearnedVerses().filter(v => retryPoolRefs.includes(v.ref))
        : getLearnedVerses();

      const list = document.getElementById("examRangeList");
      const summary = document.getElementById("examRangeSummary");
      const badge = document.getElementById("examModeBadge");

      badge.innerHTML = retryMode
        ? `<span class="mode-badge">재시험 모드</span>`
        : "";

      if (!source.length) {
        list.innerHTML = `<span class="muted">${retryMode ? "재시험 대상 성구가 없습니다." : "누적 학습 성구가 없습니다."}</span>`;
        summary.textContent = "";
        return;
      }

      list.innerHTML = source.map(v => {
        const status = examStatuses[v.ref] || { state: "idle", score: null };
        let cls = "range-item";

        if (status.state === "active") {
          cls += " active";
        } else if (status.state === "done") {
          cls += status.score === 100 ? " done-perfect" : " done-imperfect";
        }

        return `<span class="${cls}">${v.ref}</span>`;
      }).join("");

      const completed = source.filter(v => {
        const status = examStatuses[v.ref];
        if (!status) return false;
        if (retryMode) return status.state === "done" && status.score === 100;
        return status.state === "done";
      }).length;

      const remaining = source.filter(v => {
        const status = examStatuses[v.ref];
        if (retryMode) return !status || status.score < 100;
        return !status || status.state !== "done";
      }).length;

      summary.textContent = retryMode
        ? `재시험 범위 ${source.length}절 · 초록 완료 ${completed}절 · 남은 문제 ${remaining}절`
        : `누적 범위 ${source.length}절 · 출제 완료 ${completed}절 · 남은 문제 ${remaining}절`;
    }

    function getScoreColor(score) {
      if (score >= 90) return "#059669";
      if (score >= 70) return "#d97706";
      return "#dc2626";
    }

    function buildSpacedUnits(text) {
      const units = [];
      let spacesBefore = "";

      for (const ch of text || "") {
        if (/\s/.test(ch)) {
          spacesBefore += ch;
        } else {
          units.push({
            spacesBefore,
            char: ch
          });
          spacesBefore = "";
        }
      }

      return {
        units,
        trailingSpaces: spacesBefore
      };
    }

    function compareAligned(userText, correctText) {
      const user = normalize(userText);
      const correct = normalize(correctText);

      const m = user.length;
      const n = correct.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      const back = Array.from({ length: m + 1 }, () => Array(n + 1).fill(null));

      for (let i = 1; i <= m; i++) {
        dp[i][0] = i;
        back[i][0] = "delete";
      }

      for (let j = 1; j <= n; j++) {
        dp[0][j] = j;
        back[0][j] = "insert";
      }

      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          const same = user[i - 1] === correct[j - 1];
          const diag = dp[i - 1][j - 1] + (same ? 0 : 1);
          const del = dp[i - 1][j] + 1;
          const ins = dp[i][j - 1] + 1;
          const min = Math.min(diag, del, ins);
          dp[i][j] = min;

          if (min === diag) back[i][j] = same ? "match" : "replace";
          else if (min === del) back[i][j] = "delete";
          else back[i][j] = "insert";
        }
      }

      let i = m;
      let j = n;
      const result = [];

      while (i > 0 || j > 0) {
        const action = back[i][j];

        if (action === "match") {
          result.push({ type: "correct", u: user[i - 1], c: correct[j - 1] });
          i--;
          j--;
        } else if (action === "replace") {
          result.push({ type: "wrong", u: user[i - 1], c: correct[j - 1] });
          i--;
          j--;
        } else if (action === "delete") {
          result.push({ type: "extra", u: user[i - 1], c: "" });
          i--;
        } else {
          result.push({ type: "wrong", u: "", c: correct[j - 1] });
          j--;
        }
      }

      result.reverse();

      const errorCount = result.filter(item => item.type !== "correct").length;
      const score = correct.length === 0
        ? 0
        : Math.max(0, Math.round(((correct.length - errorCount) / correct.length) * 100));

      return { score, result };
    }

    function renderMarkedVerse(correctText, userText, comp) {
      const { units: correctUnits, trailingSpaces } = buildSpacedUnits(correctText);
      const { units: userUnits } = buildSpacedUnits(userText);

      let html = "";
      let correctIndex = 0;
      let userIndex = 0;

      for (const item of comp.result) {
        if (item.type === "extra") {
          const userUnit = userUnits[userIndex];
          if (userUnit) {
            html += userUnit.spacesBefore;
            html += `<span class="char-extra">${escapeHtml(userUnit.char)}</span>`;
          } else {
            html += `<span class="char-extra">${escapeHtml(item.u)}</span>`;
          }
          userIndex++;
          continue;
        }

        const correctUnit = correctUnits[correctIndex];
        if (!correctUnit) continue;

        html += correctUnit.spacesBefore;

        if (item.type === "correct") {
          html += `<span class="char-correct">${escapeHtml(correctUnit.char)}</span>`;
          userIndex++;
        } else {
          html += `<span class="char-wrong">${escapeHtml(correctUnit.char)}</span>`;
          if (item.u) userIndex++;
        }

        correctIndex++;
      }

      while (correctIndex < correctUnits.length) {
        const correctUnit = correctUnits[correctIndex];
        html += correctUnit.spacesBefore;
        html += `<span class="char-correct">${escapeHtml(correctUnit.char)}</span>`;
        correctIndex++;
      }

      html += trailingSpaces;

      while (userIndex < userUnits.length) {
        const userUnit = userUnits[userIndex];
        html += userUnit.spacesBefore;
        html += `<span class="char-extra">${escapeHtml(userUnit.char)}</span>`;
        userIndex++;
      }

      return html;
    }

    function clearPreviousActiveStatus() {
      Object.keys(examStatuses).forEach(ref => {
        if (examStatuses[ref].state === "active") {
          examStatuses[ref].state = "idle";
        }
      });
    }

    function startRetryMode() {
      const retryVerses = getRetryVerses();
      if (!retryVerses.length) {
        alert("재시험 대상이 없습니다.");
        return;
      }

      retryMode = true;
      retryPoolRefs = retryVerses.map(v => v.ref);

      currentDailyQuestion = null;
      document.getElementById("dailyQuestionArea").style.display = "none";
      document.getElementById("dailyQuestionArea").innerHTML = "";
      document.getElementById("dailyTestInput").value = "";
      document.getElementById("dailyResult").innerHTML = "";
      renderExamRange();
      alert("재시험 모드가 시작되었습니다.");
    }

    function pickDailyQuestion() {
      const source = retryMode
        ? getLearnedVerses().filter(v => retryPoolRefs.includes(v.ref))
        : getLearnedVerses();

      if (!source.length) {
        alert(retryMode ? "재시험 대상이 없습니다." : "누적 학습 성구가 없습니다.");
        return;
      }

      Object.keys(examStatuses).forEach(ref => {
        if (examStatuses[ref].state === "active") {
          examStatuses[ref].state = "idle";
        }
      });

      let available;

      if (retryMode) {
        available = source.filter(v => {
          const status = examStatuses[v.ref];
          return !status || status.score < 100;
        });
      } else {
        available = source.filter(v => {
          const status = examStatuses[v.ref];
          return !status || status.state !== "done";
        });
      }

      if (!available.length) {
        currentDailyQuestion = null;
        document.getElementById("dailyQuestionArea").style.display = "none";
        document.getElementById("dailyQuestionArea").innerHTML = "";
        document.getElementById("dailyTestInput").value = "";
        document.getElementById("dailyResult").innerHTML = "";

        if (retryMode) {
          retryMode = false;
          retryPoolRefs = [];
          renderExamRange();
          alert("재시험이 모두 완료되었습니다.");
        } else {
          renderExamRange();
          alert("출제 가능한 성구를 모두 완료했습니다.");
        }
        return;
      }

      const i = Math.floor(Math.random() * available.length);
      currentDailyQuestion = available[i];

      examStatuses[currentDailyQuestion.ref] = {
        state: "active",
        score: examStatuses[currentDailyQuestion.ref]?.score ?? null
      };

      renderExamRange();

      document.getElementById("dailyQuestionArea").style.display = "block";
      document.getElementById("dailyQuestionArea").innerHTML = `
        <div class="ref">${currentDailyQuestion.ref}</div>
        <div class="muted">${retryMode ? "재시험 성구입니다. 다시 암송한 뒤 입력하세요." : "이 성구를 암송한 뒤 아래에 입력하세요."}</div>
      `;

      document.getElementById("dailyTestInput").value = "";
      document.getElementById("dailyResult").innerHTML = "";
    }

    function gradeDailyTest() {
      if (!currentDailyQuestion) {
        alert("먼저 문제를 뽑아주세요.");
        return;
      }

      const user = document.getElementById("dailyTestInput").value;
      const comp = compareAligned(user, currentDailyQuestion.text);

      examStatuses[currentDailyQuestion.ref] = {
        state: "done",
        score: comp.score
      };

      renderExamRange();

      document.getElementById("dailyResult").innerHTML = `
        <div class="score" style="color:${getScoreColor(comp.score)};">정확도: ${comp.score}%</div>
        <div><strong style="display:block; margin-top:12px;">정답</strong></div>
        <div class="answer-box">
          <div class="verse-line">
            <div class="verse-label">${currentDailyQuestion.ref}</div>
            <div>${renderMarkedVerse(currentDailyQuestion.text, user, comp)}</div>
          </div>
        </div>
      `;
    }

    function clearDailyTest() {
      document.getElementById("dailyTestInput").value = "";
      document.getElementById("dailyResult").innerHTML = "";
    }

    function renderAll() {
      applySettingsToInputs();
      renderToday();
      renderExamRange();
      document.getElementById("dailyQuestionArea").style.display = "none";
      document.getElementById("dailyQuestionArea").innerHTML = "";
      document.getElementById("dailyTestInput").value = "";
      document.getElementById("dailyResult").innerHTML = "";
      currentDailyQuestion = null;
      retryMode = false;
      retryPoolRefs = [];
      renderExamRange();
    }

    applySettingsToInputs();
    renderAll();
  </script>
</body>
